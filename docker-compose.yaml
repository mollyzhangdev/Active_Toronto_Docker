version: "3.6"
networks:
  activeto-docker-network:
    driver: bridge
services:
  mysqldb:
    container_name: activeto-mysql
    image: mysql:8.0.35
    environment:
      - MYSQL_HOST=mysqldb
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - TZ=${TIME_ZONE}
    ports:
      - ${MYSQL_PORT}:3306
    restart: always
    volumes:
      - mysqlvol:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d
    networks:
      activeto-docker-network:
  server:
    container_name: activeto-server
    depends_on:
      - mysqldb
    build: ./server
    restart: always
    ports:
      - ${SERVER_PORT}:8080
    environment:
      - MYSQL_HOST=mysqldb
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_PORT=3306
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - TZ=${TIME_ZONE}
    stdin_open: true
    tty: true
    networks:
      activeto-docker-network:
  scraper:
    container_name: activeto-scraper
    depends_on:
      - mysqldb
    build: ./scraper
    restart: always
    environment:
      - MYSQL_HOST=mysqldb
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_PORT=3306
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - TZ=${TIME_ZONE}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    networks:
      activeto-docker-network:


volumes:
  mysqlvol:
